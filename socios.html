<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Venecia</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d0d0d; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        h1 { text-align:center; color:#d4af37; font-size:1.3em; margin-bottom:20px; text-transform: uppercase; }
        h2 { text-align: center; color: #d4af37; text-transform: uppercase; font-size: 1em; margin: 25px 0 10px 0; border-bottom: 1px solid #d4af37; padding-bottom: 5px; position: relative; }
        .total-global-tag { position: absolute; right: 0; bottom: 5px; font-size: 0.6em; background: #d4af37; color: black; padding: 2px 6px; border-radius: 4px; }
        .input-group { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #d4af37; }
        label { display: block; font-size: 0.75em; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: white; box-sizing: border-box; font-size: 1em; }
        .tabla-resumen { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 10px; background: #111; }
        .tabla-resumen th { background: #d4af37; color: black; padding: 8px; border: 1px solid #333; }
        .tabla-resumen td { padding: 8px; border: 1px solid #333; text-align: center; }
        
        .f-tag { color: #ff4444; font-weight: bold; margin-left: 5px; } 
        .rp-tag { color: #d4af37; font-weight: bold; margin-left: 5px; } 
        
        .mini-ranking { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px; font-size: 0.85em; }
        .mini-chip { background: #2a2a2a; padding: 6px 12px; border-radius: 20px; border: 1px solid #d4af37; color: #fff; cursor: pointer; }
        
        .card-mozo { background: #252525; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #444; }
        .nombre-mozo { color: #d4af37; font-weight: bold; font-size: 1em; text-transform: uppercase; display: flex; justify-content: space-between; }
        .stats-mozo { display: flex; justify-content: space-around; margin-top: 8px; }
        .stat-item { text-align: center; }
        .stat-val { display: block; font-size: 1.1em; color: white; font-weight: bold; }
        .stat-lab { font-size: 0.65em; color: #888; text-transform: uppercase; }
        .rango-semana { text-align: center; font-size: 0.8em; color: #d4af37; margin-bottom: 10px; font-style: italic; }

        /* ESTILOS DEL CARRUSEL INTEGRADO */
        .ranking-container-perfil { 
            background: linear-gradient(145deg, #151515, #050505); 
            border-radius: 20px; border: 1px solid #222; padding: 15px;
            width: 100%; box-sizing: border-box; margin: 10px auto 25px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .header-perfil { color: #d4af37; font-size: 0.7em; font-weight: 800; letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; text-align: left; }
        .staff-wrapper { display: flex; overflow-x: auto; gap: 20px; padding-bottom: 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .staff-wrapper::-webkit-scrollbar { display: none; }
        .profile-card { text-align: center; min-width: 70px; cursor: pointer; position: relative; }
        .avatar-container { position: relative; width: 62px; height: 62px; margin: 0 auto 8px auto; }
        .avatar-circle { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #222; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .rank-0 .avatar-circle { border-color: #d4af37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .badge-perfil { position: absolute; top: -5px; right: -5px; font-size: 18px; z-index: 2; }
        .name-tag-perfil { font-size: 0.65em; font-weight: 600; color: #777; text-transform: uppercase; }
        .info-card-perfil { margin: 15px auto 5px auto; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 12px; padding: 10px; text-align: center; display: none; width: 90%; }
        .top-product-perfil { font-size: 0.65em; color: #aaa; margin-top: 10px; padding-top: 8px; border-top: 1px solid #222; font-style: italic; }

        /* MODAL DE COMANDAS */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #1a1a1a; margin: 15% auto; padding: 20px; border: 1px solid #d4af37; width: 85%; max-width: 400px; border-radius: 12px; }
        .comanda-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; font-size: 0.9em; }
        .btn-cerrar { background: #d4af37; color: black; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>PANEL DE CONTROL VENECIA</h1>
    
    <div class="ranking-container-perfil">
        <div class="header-perfil">PERFIL DE MOZOS</div>
        <div id="lista-mozos-perfil" class="staff-wrapper"></div>
        
        <div id="info-box-perfil" class="info-card-perfil">
            <div id="mozo-nombre-perfil" style="font-weight: 800; color: #d4af37; font-size: 0.85em; margin-bottom: 8px;"></div>
            <div style="display: flex; justify-content: space-around; align-items: center;">
                <div class="stat-item">
                    <span id="mozo-total-perfil" class="stat-val">0</span>
                    <span class="stat-lab">Botellas</span>
                </div>
                <div style="width: 1px; height: 18px; background: #333;"></div>
                <div class="stat-item">
                    <span id="mozo-rp-perfil" class="stat-val" style="color:#d4af37">0</span>
                    <span class="stat-lab">RP</span>
                </div>
            </div>
            <div id="mozo-top-perfil" class="top-product-perfil"></div>
        </div>
    </div>

    <div class="input-group">
        <label>Ver Movimiento del Día:</label>
        <input type="date" id="filtro" onchange="cargarTodo()">
    </div>

    <div id="mini-ranking-diario" class="mini-ranking"></div>

    <h2>Botellas Entregadas (Hoy) <span id="global-botellas" class="total-global-tag">Total: 0</span></h2>
    <table class="tabla-resumen">
        <thead><tr><th>CANT</th><th>MOZO / CLIENTE</th><th>PRODUCTO</th></tr></thead>
        <tbody id="tabla-botellas"></tbody>
    </table>

    <h2>Cortesías Entregadas (Hoy)</h2>
    <table class="tabla-resumen">
        <thead><tr><th>CANT</th><th>ASIGNADO A</th><th>PRODUCTO</th></tr></thead>
        <tbody id="tabla-cortesias"></tbody>
    </table>

    <h2 style="background:#d4af37; color:black; padding:5px; margin-top:40px;">Ranking Semanal</h2>
    <div class="input-group">
        <label>Seleccionar Semana:</label>
        <input type="date" id="filtroSemana" onchange="cargarRankingSemanal()">
    </div>
    <div id="texto-semana" class="rango-semana"></div>
    <div id="ranking-semanal"></div>

    <h2 style="background:#d4af37; color:black; padding:5px; margin-top:40px;">Ranking Mensual de Mozos</h2>
    <div class="input-group">
        <label>Seleccionar Mes:</label>
        <input type="month" id="filtroMes" onchange="cargarBalanceMensual()">
        <label style="margin-top:10px;">Ver Periodo:</label>
        <select id="filtroQuincena" onchange="cargarBalanceMensual()">
            <option value="mes">Mes Completo</option>
            <option value="q1">1ra Quincena (1 - 15)</option>
            <option value="q2">2da Quincena (16 - Fin)</option>
        </select>
    </div>
    <div id="ranking-mozos"></div>
</div>

<div id="modalComandas" class="modal">
    <div class="modal-content">
        <h3 id="modalTitulo" style="color:#d4af37; margin-top:0; text-align:center;"></h3>
        <div id="cuerpoComandas"></div>
        <button class="btn-cerrar" onclick="cerrarModal()">CERRAR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAKJ0vJGvnzIdkKIvD1w0NCStA19T-TzoM",
        authDomain: "venecia-control.firebaseapp.com",
        projectId: "venecia-control",
        storageBucket: "venecia-control.firebasestorage.app",
        messagingSenderId: "486778694402",
        appId: "1:486778694402:web:4276617163b85b5b7bf01b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('filtro').value = hoy;
    document.getElementById('filtroSemana').value = hoy;
    document.getElementById('filtroMes').value = hoy.substring(0, 7);

    let registrosDelDia = [];
    let statsGlobalesPerfiles = {}; 

    function cargarTodo() {
        const fecha = document.getElementById('filtro').value;
        cargarBotellas(fecha);
        cargarCortesias(fecha);
        cargarRankingSemanal();
        cargarBalanceMensual();
        actualizarCarruselPerfiles(); 
    }

    // --- LÓGICA DEL CARRUSEL DE PERFILES ---
    function actualizarCarruselPerfiles() {
        const mesActual = document.getElementById('filtroMes').value;
        db.collection("ventas").where("f", ">=", `${mesActual}-01`).where("f", "<=", `${mesActual}-31`).onSnapshot(snap => {
            let data = {};
            snap.forEach(doc => {
                const d = doc.data(); const mozo = d.m || "Otros"; const cant = parseInt(d.c) || 0;
                const esRP = (d.tipo === "RP" || (d.b && d.b.toUpperCase().includes("RP")));
                const botella = d.b ? d.b.replace(/ RP/i, "").trim() : "S/N";

                if(!data[mozo]) data[mozo] = { normal: 0, rp: 0, productos: {} };
                if(esRP) data[mozo].rp += cant;
                else {
                    data[mozo].normal += cant;
                    data[mozo].productos[botella] = (data[mozo].productos[botella] || 0) + cant;
                }
            });
            statsGlobalesPerfiles = data;
            renderizarCarrusel(data);
        });
    }

    function renderizarCarrusel(data) {
        const wrapper = document.getElementById('lista-mozos-perfil');
        const mozosOrdenados = Object.entries(data).sort((a,b) => b[1].normal - a[1].normal);
        
        wrapper.innerHTML = mozosOrdenados.map(([nombre, stats], index) => {
            const medalla = index === 0 ? '👑' : (index === 1 ? '🥈' : (index === 2 ? '🥉' : ''));
            const nombreArchivo = nombre.toUpperCase(); 
            
            return `
                <div class="profile-card rank-${index}" onclick="verDetallePerfil('${nombre}')">
                    <div class="avatar-container">
                        ${medalla ? `<span class="badge-perfil">${medalla}</span>` : ''}
                        <div class="avatar-circle">
                            <img src="fotos/${nombreArchivo}.jpg" onerror="this.src='https://ui-avatars.com/api/?name=${nombre}&background=111&color=d4af37&bold=true'">
                        </div>
                    </div>
                    <div class="name-tag-perfil">${nombre}</div>
                </div>
            `;
        }).join('');
    }

    function verDetallePerfil(nombre) {
        const box = document.getElementById('info-box-perfil');
        const s = statsGlobalesPerfiles[nombre];
        if(!s) return;
        
        box.style.display = 'block';
        document.getElementById('mozo-nombre-perfil').innerText = nombre.toUpperCase();
        document.getElementById('mozo-total-perfil').innerText = s.normal;
        document.getElementById('mozo-rp-perfil').innerText = s.rp;
        
        const topProd = Object.entries(s.productos).sort((a,b) => b[1] - a[1])[0];
        // CAMBIO DE TEXTO AQUÍ
        document.getElementById('mozo-top-perfil').innerText = `⭐ Botella más vendida: ${topProd ? topProd[0] : '---'}`;
    }

    // --- FUNCIONES ORIGINALES ---
    function cargarBotellas(fecha) {
        db.collection("ventas").where("f", "==", fecha).onSnapshot(snap => {
            const tabla = document.getElementById('tabla-botellas');
            const miniRankingDiv = document.getElementById('mini-ranking-diario');
            tabla.innerHTML = ""; miniRankingDiv.innerHTML = ""; registrosDelDia = [];
            let totalGeneral = 0; let mozosHoy = {}; let dataArr = [];

            snap.forEach(doc => {
                const d = doc.data(); registrosDelDia.push(d);
                const cant = parseInt(d.c) || 0; totalGeneral += cant;
                const esRP = (d.tipo === "RP" || (d.b && d.b.toUpperCase().includes("RP")));
                const esFantasma = (d.tipo === "FANTASMA" || (d.b && d.b.toUpperCase().includes("FANTASMA")));
                const nombreLimpio = d.b.replace(/ RP/i, "").replace(/ FANTASMA/i, "").trim();
                
                dataArr.push({ mozo: d.m, botella: nombreLimpio, cant: cant, esRP: esRP, esFantasma: esFantasma });
                if(!mozosHoy[d.m]) mozosHoy[d.m] = { normal: 0, rp: 0 };
                if(esRP) mozosHoy[d.m].rp += cant; else mozosHoy[d.m].normal += cant;
            });

            document.getElementById('global-botellas').innerText = `Total: ${totalGeneral}`;
            Object.entries(mozosHoy).sort((a,b) => (b[1].normal + b[1].rp) - (a[1].normal + a[1].rp)).forEach(([nom, st]) => {
                miniRankingDiv.innerHTML += `<div class="mini-chip" onclick="verComandas('${nom}')"><b>${nom}:</b> ${st.normal}${st.rp > 0 ? ' + '+st.rp+'RP' : ''}</div>`;
            });

            let agrupado = [];
            dataArr.forEach(item => {
                let existe = agrupado.find(x => x.mozo === item.mozo && x.botella === item.botella && x.esRP === item.esRP && x.esFantasma === item.esFantasma);
                if(existe) existe.total += item.cant; else agrupado.push({ mozo: item.mozo, botella: item.botella, total: item.cant, esRP: item.esRP, esFantasma: item.esFantasma });
            });

            agrupado.forEach(item => {
                let tag = item.esRP ? '<span class="rp-tag">[RP]</span>' : (item.esFantasma ? '<span class="f-tag">[F]</span>' : '');
                tabla.innerHTML += `<tr><td><b>${item.total}</b></td><td>${item.mozo}</td><td>${item.botella}${tag}</td></tr>`;
            });
        });
    }

    function verComandas(nombreMozo) {
        document.getElementById('modalTitulo').innerText = `COMANDAS DE ${nombreMozo}`;
        const cuerpo = document.getElementById('cuerpoComandas');
        cuerpo.innerHTML = "";
        let filtrados = registrosDelDia.filter(r => r.m === nombreMozo).sort((a, b) => (a.co || 0) - (b.co || 0));
        filtrados.forEach(r => {
            let tag = r.tipo === "RP" ? '<span class="rp-tag">[RP]</span>' : (r.tipo === "FANTASMA" ? '<span class="f-tag">[F]</span>' : '');
            cuerpo.innerHTML += `<div class="comanda-item"><span>${r.b} ${tag}</span><span style="color:#d4af37; font-weight:bold;">#${r.co || '--'}</span></div>`;
        });
        document.getElementById('modalComandas').style.display = "block";
    }

    function cerrarModal() { document.getElementById('modalComandas').style.display = "none"; }

    function cargarCortesias(fecha) {
        db.collection("cortesias").where("f", "==", fecha).onSnapshot(snap => {
            const tabla = document.getElementById('tabla-cortesias');
            tabla.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                tabla.innerHTML += `<tr><td><b>${d.c}</b></td><td>${d.n}</td><td>${d.p}</td></tr>`;
            });
        });
    }

    function cargarRankingSemanal() {
        const inputFecha = document.getElementById('filtroSemana').value;
        const fechaBase = new Date(inputFecha + "T12:00:00");
        const diff = fechaBase.getDate() - fechaBase.getDay() + (fechaBase.getDay() === 0 ? -6 : 1);
        const lunes = new Date(fechaBase.setDate(diff));
        const domingo = new Date(lunes); domingo.setDate(lunes.getDate() + 6);
        document.getElementById('texto-semana').innerText = `Sumando del ${lunes.toLocaleDateString('es-ES', {day:'2-digit', month:'short'})} al ${domingo.toLocaleDateString('es-ES', {day:'2-digit', month:'short'})}`;
        renderRanking("ranking-semanal", lunes.toISOString().split('T')[0], domingo.toISOString().split('T')[0]);
    }

    function cargarBalanceMensual() {
        const mesSel = document.getElementById('filtroMes').value;
        const qSel = document.getElementById('filtroQuincena').value;
        let fInicio = `${mesSel}-01`, fFin = `${mesSel}-31`;
        if(qSel === "q1") fFin = `${mesSel}-15`; else if(qSel === "q2") fInicio = `${mesSel}-16`;
        renderRanking("ranking-mozos", fInicio, fFin);
    }

    async function renderRanking(containerId, fInicio, fFin) {
        db.collection("ventas").where("f", ">=", fInicio).where("f", "<=", fFin).onSnapshot(snap => {
            const div = document.getElementById(containerId); div.innerHTML = "";
            let balance = {};
            snap.forEach(doc => {
                const d = doc.data(); const mozo = d.m || "Otros"; const cant = parseInt(d.c) || 0;
                const esRP = (d.tipo === "RP" || (d.b && d.b.toUpperCase().includes("RP")));
                if(!balance[mozo]) balance[mozo] = { botellas: 0, rp: 0 };
                if(esRP) balance[mozo].rp += cant; else balance[mozo].botellas += cant;
            });
            Object.entries(balance).sort((a, b) => (b[1].botellas + b[1].rp) - (a[1].botellas + a[1].rp)).forEach(([nombre, stats], index) => {
                const medalla = index === 0 ? "🥇" : (index === 1 ? "🥈" : (index === 2 ? "🥉" : ""));
                div.innerHTML += `<div class="card-mozo"><div class="nombre-mozo"><span>${medalla} ${nombre}</span> <span>POS. ${index+1}</span></div><div class="stats-mozo"><div class="stat-item"><span class="stat-val">${stats.botellas}</span><span class="stat-lab">Botellas</span></div><div class="stat-item"><span class="stat-val" style="color:#d4af37">${stats.rp}</span><span class="stat-lab">Cortesías RP</span></div></div></div>`;
            });
        });
    }

    cargarTodo();
</script>
</body>
</html>
